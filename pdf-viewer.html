<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PDF Viewer</title>
    <style>
      :root {
        --bg: #0d1117;
        --accent: #58a6ff;
        --muted: #8b949e;
      }
      
      * { box-sizing: border-box; }
      html, body { 
        height: 100%; 
        margin: 0; 
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      .pdf-viewer-scroll {
        height: 100%;
        overflow: auto;
        padding: 18px;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }
      
      .pdf-pages {
        display: flex;
        flex-direction: column;
        gap: 18px;
        align-items: center;
        width: 100%;
      }
      
      .pdf-page {
        width: fit-content;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 18px 44px rgba(0,0,0,0.28);
        overflow: hidden;
        border: 1px solid rgba(88, 166, 255, 0.12);
      }
      
      .pdf-page-label {
        font-size: 0.75rem;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 10px 12px 0;
        font-weight: 600;
      }
      
      .pdf-page canvas {
        display: block;
        width: 100%;
        height: auto;
      }
      
      .pdf-hint {
        color: var(--muted);
        font-size: 0.8rem;
        margin-bottom: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="pdfViewerScroll" class="pdf-viewer-scroll">
      <div class="pdf-hint">Scroll to move through the document. Pinch or Ctrl/trackpad wheel to zoom.</div>
      <div id="pdfPages" class="pdf-pages"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      const params = new URLSearchParams(location.search);
      const fileUrl = params.get('file');
      
      if (!fileUrl) {
        document.body.innerHTML = '<p style="padding:16px;color:#ff6b6b;">No PDF file specified.</p>';
        throw new Error('No PDF file specified');
      }

      let pdfDoc = null;
      let pdfLoadingPromise = null;
      let pdfZoom = 1;
      let pdfBaseFitScale = 1;
      let pdfRenderToken = 0;
      let pdfPinchStartDistance = 0;
      let pdfPinchStartZoom = 1;
      let pdfPinchActive = false;

      function getPDFElements() {
        return {
          scroll: document.getElementById('pdfViewerScroll'),
          pages: document.getElementById('pdfPages')
        };
      }

      function clampPDFZoom(value) {
        return Math.min(2.5, Math.max(0.7, value));
      }

      function preservePDFScroll(renderFn) {
        const { scroll } = getPDFElements();
        if (!scroll) {
          renderFn();
          return;
        }

        const previousTop = scroll.scrollTop;
        const previousHeight = Math.max(1, scroll.scrollHeight - scroll.clientHeight);
        const scrollRatio = previousTop / previousHeight;

        renderFn().then(() => {
          const nextHeight = Math.max(1, scroll.scrollHeight - scroll.clientHeight);
          scroll.scrollTop = scrollRatio * nextHeight;
        });
      }

      async function renderAllPDFPages() {
        if (!pdfDoc) {
          return;
        }

        const { pages } = getPDFElements();
        if (!pages) {
          return;
        }

        const token = ++pdfRenderToken;
        pages.innerHTML = '';

        const firstPage = await pdfDoc.getPage(1);
        const firstViewport = firstPage.getViewport({ scale: 1 });
        const paddingAllowance = 56;
        const availableWidth = Math.max(320, pages.clientWidth - paddingAllowance);
        pdfBaseFitScale = availableWidth / firstViewport.width;

        const scale = pdfBaseFitScale * pdfZoom;
        const outputScale = window.devicePixelRatio || 1;

        for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber++) {
          if (token !== pdfRenderToken) {
            return;
          }

          const page = await pdfDoc.getPage(pageNumber);
          const viewport = page.getViewport({ scale });
          const pageWrap = document.createElement('div');
          pageWrap.className = 'pdf-page';

          const label = document.createElement('div');
          label.className = 'pdf-page-label';
          label.textContent = 'Page ' + pageNumber;

          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');

          canvas.style.width = viewport.width + 'px';
          canvas.style.height = viewport.height + 'px';
          canvas.width = Math.floor(viewport.width * outputScale);
          canvas.height = Math.floor(viewport.height * outputScale);

          const renderTask = page.render({
            canvasContext: context,
            viewport: viewport,
            transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
          });

          pageWrap.appendChild(label);
          pageWrap.appendChild(canvas);
          pages.appendChild(pageWrap);

          await renderTask.promise;
        }
      }

      async function loadPDF() {
        if (pdfLoadingPromise) {
          return pdfLoadingPromise;
        }

        pdfLoadingPromise = pdfjsLib.getDocument(fileUrl).promise.then(async function(pdf) {
          pdfDoc = pdf;
          await renderAllPDFPages();
        }).catch(function(error) {
          console.error('Error loading PDF:', error);
          document.body.innerHTML = '<p style="padding:16px;color:#ff6b6b;">Failed to load PDF: ' + error.message + '</p>';
        });

        return pdfLoadingPromise;
      }

      function setPDFZoom(nextZoom) {
        const clampedZoom = clampPDFZoom(nextZoom);
        if (Math.abs(clampedZoom - pdfZoom) < 0.01) {
          return;
        }

        pdfZoom = clampedZoom;
        if (pdfDoc) {
          preservePDFScroll(renderAllPDFPages);
        }
      }

      // Load PDF on startup
      loadPDF();

      // Mouse wheel zoom
      document.addEventListener('wheel', function(event) {
        if (event.ctrlKey || event.metaKey) {
          event.preventDefault();
          const zoomDirection = event.deltaY > 0 ? -1 : 1;
          setPDFZoom(pdfZoom + zoomDirection * 0.12);
        }
      }, { passive: false });

      // Touch pinch zoom
      document.addEventListener('touchstart', function(event) {
        if (event.touches.length === 2) {
          pdfPinchActive = true;
          pdfPinchStartDistance = Math.hypot(
            event.touches[0].clientX - event.touches[1].clientX,
            event.touches[0].clientY - event.touches[1].clientY
          );
          pdfPinchStartZoom = pdfZoom;
        }
      }, { passive: true });

      document.addEventListener('touchmove', function(event) {
        if (pdfPinchActive && event.touches.length === 2) {
          event.preventDefault();
          const currentDistance = Math.hypot(
            event.touches[0].clientX - event.touches[1].clientX,
            event.touches[0].clientY - event.touches[1].clientY
          );
          const nextZoom = pdfPinchStartZoom * (currentDistance / pdfPinchStartDistance);
          setPDFZoom(nextZoom);
        }
      }, { passive: false });

      document.addEventListener('touchend', function() {
        pdfPinchActive = false;
      }, { passive: true });

      // Re-render on window resize
      window.addEventListener('resize', function() {
        if (pdfDoc) {
          preservePDFScroll(renderAllPDFPages);
        }
      });
    </script>
  </body>
</html>
