<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to LinkedIn...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #0d1117;
      color: #58a6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .terminal {
      max-width: 600px;
      width: 90%;
      padding: 30px;
      background: rgba(13, 17, 23, 0.95);
      border: 1px solid rgba(88, 166, 255, 0.3);
      border-radius: 4px;
      box-shadow: 0 0 30px rgba(88, 166, 255, 0.2);
    }

    .terminal-header {
      color: #79c0ff;
      font-size: 18px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(88, 166, 255, 0.2);
      padding-bottom: 10px;
    }

    .terminal-body {
      font-size: 14px;
      line-height: 1.8;
    }

    .line {
      opacity: 0;
      animation: fadeIn 0.3s forwards;
      margin: 8px 0;
    }

    .line:nth-child(1) { animation-delay: 0.2s; }
    .line:nth-child(2) { animation-delay: 0.5s; }
    .line:nth-child(3) { animation-delay: 0.8s; }
    .line:nth-child(4) { animation-delay: 1.1s; }
    .line:nth-child(5) { animation-delay: 1.4s; }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .prompt {
      color: #00ff00;
    }

    .loading {
      display: inline-block;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(88, 166, 255, 0.1);
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #58a6ff, #79c0ff);
      width: 0%;
      animation: progress 2s ease-out forwards;
      box-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
    }

    @keyframes progress {
      to {
        width: 100%;
      }
    }

    .url {
      color: #79c0ff;
      text-decoration: underline;
    }

    .success {
      color: #00ff00;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <span class="prompt">$</span> harsha-c.me/redirect
    </div>
    <div class="terminal-body">
      <div class="line"><span class="prompt">></span> Initializing redirect protocol...</div>
      <div class="line"><span class="prompt">></span> Target: <span class="url">https://www.linkedin.com/in/harsha-c14920/</span></div>
      <div class="line"><span class="prompt">></span> Authentication: <span class="success">✓ Verified</span></div>
      <div class="line"><span class="prompt">></span> Establishing secure connection<span class="loading">...</span></div>
      <div class="line"><span class="prompt">></span> <span class="success">Redirecting now</span></div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <script>
    // Redirect after 2 seconds
    setTimeout(() => {
      window.location.href = 'https://www.linkedin.com/in/harsha-c14920/';
    }, 2000);
  </script>
</body>
</html>
